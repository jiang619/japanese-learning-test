<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>者右的日语入门资料</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- 极细宋体：Noto Serif SC 100 / 200 / 300 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ===== RESET ===== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== 背景 & 丝绸涌动层 ===== */
    body {
      min-height: 100vh;
      background: #f7f0e6;
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-weight: 200;
      color: #3e3530;
      padding: 0 16px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* ——— 丝绸涌动背景 ——— */
    .silk {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .silk-layer {
      position: absolute;
      inset: -60% -60%;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      will-change: transform;
    }

    .silk-layer--1 {
      background: radial-gradient(ellipse at 30% 40%, #e8d5b7 0%, transparent 70%);
      animation: silkDrift 22s ease-in-out infinite alternate;
    }
    .silk-layer--2 {
      background: radial-gradient(ellipse at 70% 60%, #dcc4a0 0%, transparent 70%);
      animation: silkDrift 28s ease-in-out infinite alternate-reverse;
    }
    .silk-layer--3 {
      background: radial-gradient(ellipse at 50% 80%, #f0e3ce 0%, transparent 65%);
      animation: silkDrift 18s ease-in-out infinite alternate;
    }
    .silk-layer--4 {
      background: radial-gradient(ellipse at 20% 20%, #c9b18b 0%, transparent 60%);
      animation: silkDrift 32s ease-in-out infinite alternate-reverse;
      opacity: 0.2;
    }
    .silk-layer--5 {
      background: radial-gradient(ellipse at 80% 20%, #eedcc2 0%, transparent 60%);
      animation: silkDrift 24s ease-in-out infinite alternate;
      opacity: 0.25;
    }

    @keyframes silkDrift {
      0%   { transform: translate(-4%, -2%) scale(1) rotate(0deg); }
      25%  { transform: translate(2%, -5%) scale(1.04) rotate(2deg); }
      50%  { transform: translate(5%, 3%) scale(0.96) rotate(-1deg); }
      75%  { transform: translate(-2%, 5%) scale(1.02) rotate(3deg); }
      100% { transform: translate(3%, -3%) scale(1) rotate(-2deg); }
    }

    /* ===== 容器 ===== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 580px;
      margin: 0 auto;
    }

    /* ===== 头部 ===== */
    .header {
      padding: 56px 0 8px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.1rem;
      font-weight: 200;
      letter-spacing: 0.12em;
      color: #4a3f35;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .header .subtitle {
      font-size: 0.92rem;
      font-weight: 300;
      color: #8a7d6c;
      line-height: 1.8;
      letter-spacing: 0.06em;
      max-width: 460px;
      margin: 0 auto;
    }

    .header .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9b89e, transparent);
      margin: 24px auto 0;
    }

    /* ===== 卡片网格 ===== */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 32px 0;
    }

    /* ===== 卡片 ===== */
    .card {
      background: rgba(255, 250, 242, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 24px 24px 20px;
      border: 1px solid rgba(210, 190, 165, 0.25);
      box-shadow:
        0 4px 20px rgba(140, 115, 85, 0.06),
        0 1px 3px rgba(140, 115, 85, 0.04);
      transition: box-shadow 0.35s ease, transform 0.35s ease;
    }

    .card:hover {
      box-shadow:
        0 12px 36px rgba(140, 115, 85, 0.10),
        0 2px 6px rgba(140, 115, 85, 0.06);
      transform: translateY(-2px);
    }

    /* — 卡片头部：编号 + 名称 — */
    .card-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .card-id {
      font-size: 0.82rem;
      font-weight: 400;
      color: #b2946b;
      letter-spacing: 0.04em;
    }

    .card-name {
      font-size: 1.18rem;
      font-weight: 400;
      color: #4a3f35;
      letter-spacing: 0.06em;
    }

    .card-sub {
      font-size: 0.82rem;
      font-weight: 300;
      color: #a8947c;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.88rem;
      font-weight: 200;
      color: #8a7d6c;
      line-height: 1.6;
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }

    /* — 按钮 — */
    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 24px;
      border-radius: 40px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.3s ease;
      background: transparent;
      border: 1px solid #d4c0a6;
      color: #6b5d4d;
    }

    .card-btn:hover {
      background: #d4c0a6;
      color: #fdfaf5;
      box-shadow: 0 4px 14px rgba(180, 155, 125, 0.25);
    }

    .card-btn:active {
      transform: scale(0.97);
    }

    .card-btn .icon {
      font-size: 1rem;
      line-height: 1;
    }

    /* 已复制 / 已下载 反馈态 */
    .card-btn.feedback {
      background: #b2946b;
      color: #fdfaf5;
      border-color: #b2946b;
      pointer-events: none;
    }

    /* ===== 页脚 ===== */
    .footer {
      text-align: center;
      padding: 8px 0 32px;
      font-size: 0.78rem;
      font-weight: 200;
      color: #b8aa98;
      letter-spacing: 0.06em;
      line-height: 2;
    }

    .footer .row {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .footer .sep {
      color: #d4c8b8;
      margin: 0 6px;
    }

    .footer a {
      color: #b8aa98;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #8a7d6c;
    }

    /* ===== Toast 提示 ===== */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(60, 50, 40, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #f5efe6;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: all 0.4s ease;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 400px) {
      .header h1 {
        font-size: 1.7rem;
      }
      .card {
        padding: 20px 18px 16px;
      }
      .card-name {
        font-size: 1.05rem;
      }
    }

    @media (min-width: 640px) {
      body {
        padding: 0 24px 60px;
      }
      .header {
        padding: 72px 0 12px;
      }
      .header h1 {
        font-size: 2.4rem;
      }
      .cards {
        gap: 20px;
        padding: 40px 0;
      }
      .card {
        padding: 28px 28px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- ===== 丝绸涌动背景 ===== -->
  <div class="silk" aria-hidden="true">
    <div class="silk-layer silk-layer--1"></div>
    <div class="silk-layer silk-layer--2"></div>
    <div class="silk-layer silk-layer--3"></div>
    <div class="silk-layer silk-layer--4"></div>
    <div class="silk-layer silk-layer--5"></div>
  </div>

  <!-- ===== Toast ===== -->
  <div id="toast" class="toast"></div>

  <!-- ===== 主内容 ===== -->
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <h1>者右的日语入门资料</h1>
      <p class="subtitle">
        感谢购入，这套资料帮助过 50+ 零基础学习者建立整体认知，
        少走弯路，认知效率提高 30%
      </p>
      <div class="divider"></div>
    </header>

    <!-- 卡片列表（由 JS 动态渲染） -->
    <div id="cardsContainer" class="cards"></div>

    <!-- 页脚 -->
    <footer class="footer" id="footer"></footer>
  </div>

  <!-- ===== 数据 ===== -->
  <script src="data.js"></script>

  <script>
    (function () {
      'use strict'

      /* ---------- DOM 引用 ---------- */
      const container = document.getElementById('cardsContainer')
      const footerEl = document.getElementById('footer')
      const toastEl = document.getElementById('toast')
      let toastTimer = null

      /* ---------- Toast ---------- */
      function showToast(msg) {
        if (toastTimer) clearTimeout(toastTimer)
        toastEl.textContent = msg
        toastEl.classList.add('show')
        toastTimer = setTimeout(function () {
          toastEl.classList.remove('show')
        }, 2000)
      }

      /* ---------- 文件下载 ---------- */
      function downloadFile(filePath) {
        // 创建 <a> 标签触发 download
        var a = document.createElement('a')
        a.href = filePath
        a.download = filePath.split('/').pop() // 保留原文件名
        document.body.appendChild(a)
        a.click()
        document.body.removeChild(a)
      }

      /* ---------- 复制网址 ---------- */
      function copyUrl(url, label) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function () {
            showToast('✅ 已复制：' + label)
          }).catch(function () {
            fallbackCopy(url, label)
          })
        } else {
          fallbackCopy(url, label)
        }
      }

      function fallbackCopy(text, label) {
        var ta = document.createElement('textarea')
        ta.value = text
        ta.style.position = 'fixed'
        ta.style.opacity = '0'
        document.body.appendChild(ta)
        ta.select()
        try {
          document.execCommand('copy')
          showToast('✅ 已复制：' + label)
        } catch (e) {
          showToast('⚠️ 复制失败，请手动复制')
        }
        document.body.removeChild(ta)
      }

      /* ---------- 按钮点击处理 ---------- */
      function handleBtnClick(mod, btnEl) {
        // 防止重复点击
        if (btnEl.classList.contains('feedback')) return

        if (mod.type === 'copy-url') {
          copyUrl(mod.url, mod.copyLabel || '网址')
          btnEl.classList.add('feedback')
          btnEl.innerHTML = '<span class="icon">✓</span> 已保存'
        } else if (mod.type === 'download') {
          downloadFile(mod.file)
          showToast('📥 开始下载 ' + mod.file.split('/').pop())
          btnEl.classList.add('feedback')
          btnEl.innerHTML = '<span class="icon">✓</span> 已下载'
        }

        // 3 秒后恢复按钮
        setTimeout(function () {
          btnEl.classList.remove('feedback')
          renderButton(btnEl, mod)
        }, 3000)
      }

      /* ---------- 渲染按钮 ---------- */
      function renderButton(btnEl, mod) {
        if (mod.type === 'copy-url') {
          btnEl.innerHTML = '<span class="icon">🔗</span> 保存网址'
        } else {
          btnEl.innerHTML = '<span class="icon">↓</span> 立即下载'
        }
      }

      /* ---------- 渲染页面 ---------- */
      function render() {
        var data = window.siteData
        if (!data) {
          container.innerHTML =
            '<p style="text-align:center;color:#b8aa98;padding:40px 0;">正在加载配置…</p>'
          return
        }

        // —— 卡片 ——
        var html = ''
        data.modules.forEach(function (m) {
          html += '<div class="card">'
          html += '  <div class="card-head">'
          html += '    <span class="card-id">' + m.id + '</span>'
          html += '    <span class="card-name">' + m.name + '</span>'
          html += '  </div>'
          if (m.subtitle) {
            html += '  <div class="card-sub">' + m.subtitle + '</div>'
          }
          html += '  <div class="card-desc">' + (m.desc || '') + '</div>'
          html += '  <button class="card-btn" data-module-id="' + m.id + '">'
          if (m.type === 'copy-url') {
            html += '    <span class="icon">🔗</span> 保存网址'
          } else {
            html += '    <span class="icon">↓</span> 立即下载'
          }
          html += '  </button>'
          html += '</div>'
        })
        container.innerHTML = html

        // —— 绑定按钮事件 ——
        var btns = container.querySelectorAll('.card-btn')
        data.modules.forEach(function (m, idx) {
          btns[idx].addEventListener('click', function (e) {
            handleBtnClick(m, e.currentTarget)
          })
        })

        // —— 页脚 ——
        var f = data.footer
        if (f) {
          var fHtml = ''
          if (f.author) {
            fHtml += '<div class="row">作者：' + f.author + '</div>'
          }
          fHtml += '<br />'
          if (f.douyin) {
            fHtml += '<span class="row">抖音：' + f.douyin + '</span>'
            fHtml += '<span class="sep">|</span>'
          }
          if (f.xiaohongshu) {
            fHtml += '<span class="row">小红书：' + f.xiaohongshu + '</span>'
          }
          var hasVersion = f.version || f.updated
          if (hasVersion) {
            fHtml += '<br />'
            if (f.version) {
              fHtml += '<span>' + f.version + '</span>'
            }
            if (f.updated) {
              fHtml += '<span class="sep">·</span>'
              fHtml += '<span>' + f.updated + '</span>'
            }
          }
          footerEl.innerHTML = fHtml
        }
      }

      /* ---------- 启动 ---------- */
      render()
    })()
  </script>
</body>
</html>
